<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Campamento 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;



500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0f1117;--surface:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);--text:#f0f0f0;--muted:rgba(255,255,255,0.45);--green:#22c55e;--red:#ef4444; }
  body { font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column; }

  /* Header */
  #header { display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(15,17,23,.97);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20; }
  #header h1 { font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase; }
  #mode-badge { font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);letter-spacing:.03em; }
  #mode-badge.admin { background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5; }

  /* Legend */
  #legend { display:flex;gap:16px;padding:8px 16px;background:rgba(15,17,23,.92);border-bottom:1px solid var(--border);flex-shrink:0; }
  .li { display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted); }
  .dot { width:9px;height:9px;border-radius:50%;flex-shrink:0; }
  .dot.g { background:var(--green); } .dot.r { background:var(--red); }

  /* Map */
  #map-wrapper { flex:1;position:relative;overflow:hidden; }
  #map-bg { position:absolute;inset:0;background-image:url('mapa.jpg');background-size:cover;background-position:center;filter:brightness(.65) saturate(.8); }

  /* Pins */
  .pin { position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default;user-select:none;-webkit-tap-highlight-color:transparent; }
  .pin-circle { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:white;transition:transform .15s;border:2px solid rgba(255,255,255,.2); }
  .pin.disponible .pin-circle { background:var(--green);box-shadow:0 0 0 6px rgba(34,197,94,.2);animation:pg 2.5s infinite; }
  .pin.ocupado   .pin-circle { background:var(--red);  box-shadow:0 0 0 6px rgba(239,68,68,.2); }
  @keyframes pg { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 70%{box-shadow:0 0 0 10px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
  .pin-label { font-size:9px;font-weight:500;background:rgba(0,0,0,.8);color:white;padding:2px 5px;border-radius:3px;white-space:nowrap;max-width:80px;text-align:center;line-height:1.3; }
  .pin-team  { font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;display:none; }
  .history-dots { display:flex;gap:2px;flex-wrap:wrap;max-width:80px;justify-content:center; }
  .hdot { width:7px;height:7px;border-radius:50%;opacity:.85; }
  body.is-admin .pin { cursor:pointer; }
  body.is-admin .pin:active .pin-circle { transform:scale(.88); }

  /* Sheet */
  #sheet-bg { position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:30;display:none;align-items:flex-end; }
  #sheet-bg.open { display:flex; }
  #sheet { background:#161b27;border-radius:18px 18px 0 0;border:.5px solid var(--border);width:100%;padding:18px 16px 32px; }
  #sheet-handle { width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px; }
  #sheet-title { font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px; }
  #sheet-sub   { font-size:12px;color:var(--muted);margin-bottom:16px; }

  /* Status toggle row */
  #status-row { display:flex;gap:8px;margin-bottom:14px; }
  .status-btn { flex:1;padding:9px 0;border-radius:10px;border:.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px; }
  .status-btn.active-green { background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.5);color:#86efac; }
  .status-btn.active-red   { background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.5); color:#fca5a5; }

  /* Section label */
  .section-label { font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px; }

  /* Teams grid */
  #teams-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px; }
  .team-btn {
    padding:10px;border-radius:10px;border:.5px solid var(--border);
    background:var(--surface);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:all .15s;text-align:left;position:relative;
  }
  .team-btn:hover { background:rgba(255,255,255,.1); }
  /* Selected (playing now) */
  .team-btn.selected { border-width:1.5px; }
  /* Was here before (history, but NOT currently playing) */
  .team-btn.visited { opacity:.5; }
  /* Cancel badge */
  .team-btn .cancel-x {
    margin-left:auto;font-size:14px;line-height:1;
    color:rgba(255,255,255,.4);display:none;
  }
  .team-btn.selected .cancel-x,
  .team-btn.visited  .cancel-x { display:block; }
  .team-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }

  #cancel-btn { width:100%;padding:8px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer; }

  /* Scoreboard */
  #scoreboard { background:rgba(10,12,18,.95);border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0; }
  #scoreboard h3 { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px; }
  #score-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:6px; }
  .score-card { background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 8px;display:flex;align-items:center;gap:6px; }
  .sc-dot  { width:9px;height:9px;border-radius:50%;flex-shrink:0; }
  .sc-info { flex:1;min-width:0; }
  .sc-name  { font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .sc-count { font-size:9px;color:var(--muted); }
  .sc-bar-wrap { height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:3px;overflow:hidden; }
  .sc-bar { height:100%;border-radius:1px;transition:width .4s ease; }

  #admin-bar { display:none;padding:8px 16px;background:rgba(239,68,68,.08);border-top:1px solid rgba(239,68,68,.18);font-size:11px;color:#fca5a5;text-align:center;flex-shrink:0; }
  body.is-admin #admin-bar { display:block; }

  #toast { position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(20,22,30,.96);border:1px solid var(--border);color:white;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0);opacity:1; }

  #loading { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,17,23,.85);z-index:50;flex-direction:column;gap:12px; }
  .spinner { width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="header">
  <h1>🏕 Campamento 2026</h1>
  <span id="mode-badge">👀 Vista equipo</span>
</div>
<div id="legend">
  <div class="li"><span class="dot g"></span>Disponible</div>
  <div class="li"><span class="dot r"></span>Ocupado</div>
</div>

<div id="map-wrapper">
  <div id="map-bg"></div>
  <div id="loading"><div class="spinner"></div><span style="font-size:13px;color:var(--muted)">Conectando...</span></div>

  <div id="sheet-bg">
    <div id="sheet">
      <div id="sheet-handle"></div>
      <div id="sheet-title">Estación</div>
      <div id="sheet-sub">Gestiona el estado y los grupos</div>

      <!-- Disponible / Ocupado toggle -->
      <div id="status-row">
        <button class="status-btn" id="btn-disponible" onclick="setStatus('disponible')">🟢 Disponible</button>
        <button class="status-btn" id="btn-ocupado"    onclick="setStatus('ocupado')">🔴 Ocupado</button>
      </div>

      <!-- Groups -->
      <div class="section-label">Grupos — toca para añadir o cancelar</div>
      <div id="teams-grid"></div>

      <button id="cancel-btn" onclick="closeSheet()">Cerrar</button>
    </div>
  </div>
</div>

<div id="scoreboard">
  <h3>🏆 Juegos completados por grupo</h3>
  <div id="score-grid"></div>
</div>
<div id="admin-bar">✏️ Toca un pin para gestionar el estado</div>
<div id="toast"></div>

<script type="module">
import { initializeApp }                       from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

/* ── FIREBASE CONFIG ── reemplaza con los tuyos ── */
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

/* ── EQUIPOS ── */
const TEAMS = [
  { id:"g1", name:"Grupo 1", color:"#a78bfa" },
  { id:"g2", name:"Grupo 2", color:"#38bdf8" },
  { id:"g3", name:"Grupo 3", color:"#fb923c" },
  { id:"g4", name:"Grupo 4", color:"#f472b6" },
  { id:"g5", name:"Grupo 5", color:"#34d399" },
  { id:"g6", name:"Grupo 6", color:"#fbbf24" },
];

/* ── ESTACIONES ── ajusta left/top % según tu mapa ── */
const STATIONS = [
  { id:"entrada",   label:"Entrada",    num:"1", left:"7%",  top:"50%" },
  { id:"spau",      label:"S. Pau",     num:"2", left:"27%", top:"38%" },
  { id:"comedor",   label:"Comedor",    num:"3", left:"52%", top:"33%" },
  { id:"msol",      label:"M. Sol",     num:"4", left:"52%", top:"57%" },
  { id:"vbertran",  label:"V. Bertran", num:"5", left:"65%", top:"48%" },
  { id:"sjuan",     label:"S. Juan",    num:"6", left:"78%", top:"37%" },
  { id:"salaPrinc", label:"Sala Ppal.", num:"7", left:"65%", top:"67%" },
];

/* ── INIT ── */
const app     = initializeApp(firebaseConfig);
const db      = getDatabase(app);
const isAdmin = new URLSearchParams(window.location.search).get('role') === 'guia';

if (isAdmin) {
  document.body.classList.add('is-admin');
  const b = document.getElementById('mode-badge');
  b.textContent = '🔧 Modo guía';
  b.classList.add('admin');
}

let currentStates = {};
let activeStation = null;
let toastTimer;

/* ── BUILD PINS ── */
const mapWrapper = document.getElementById('map-wrapper');
STATIONS.forEach(s => {
  const p = document.createElement('div');
  p.className   = 'pin disponible';
  p.id          = 'pin-' + s.id;
  p.style.left  = s.left;
  p.style.top   = s.top;
  p.innerHTML   = `
    <div class="pin-circle">${s.num}</div>
    <div class="pin-label">${s.label}</div>
    <div class="pin-team"  id="pt-${s.id}"></div>
    <div class="history-dots" id="hd-${s.id}"></div>`;
  if (isAdmin) p.addEventListener('click', () => openSheet(s.id));
  mapWrapper.appendChild(p);
});

/* ── REALTIME LISTENER ── */
onValue(ref(db, 'juegos'), snapshot => {
  document.getElementById('loading').style.display = 'none';
  currentStates = snapshot.val() || {};
  STATIONS.forEach(s => renderPin(s.id));
  renderScoreboard();
});

/* ── RENDER PIN ── */
function renderPin(id) {
  const d   = currentStates[id] || { status:'disponible', currentTeam:null, history:[] };
  const pin = document.getElementById('pin-' + id);
  const pt  = document.getElementById('pt-' + id);
  const hd  = document.getElementById('hd-' + id);

  pin.className = 'pin ' + (d.status || 'disponible');

  if (d.currentTeam) {
    const t = TEAMS.find(t => t.id === d.currentTeam);
    if (t) {
      pt.style.cssText = `display:block;background:${hex(t.color,.25)};color:${t.color};border:0.5px solid ${hex(t.color,.5)}`;
      pt.textContent   = t.name;
    }
  } else {
    pt.style.display = 'none';
  }

  const history = d.history || [];
  hd.innerHTML  = history.map(tid => {
    const t = TEAMS.find(t => t.id === tid);
    return t ? `<span class="hdot" style="background:${t.color}" title="${t.name}"></span>` : '';
  }).join('');
}

/* ── SCOREBOARD ── */
function renderScoreboard() {
  const counts = {}; TEAMS.forEach(t => counts[t.id] = 0);
  STATIONS.forEach(s => {
    (currentStates[s.id]?.history || []).forEach(tid => { if (counts[tid] !== undefined) counts[tid]++; });
  });
  const max = Math.max(...Object.values(counts), 1);
  document.getElementById('score-grid').innerHTML = TEAMS.map(t => `
    <div class="score-card">
      <span class="sc-dot" style="background:${t.color}"></span>
      <div class="sc-info">
        <div class="sc-name">${t.name}</div>
        <div class="sc-count">${counts[t.id]} juego${counts[t.id] !== 1 ? 's' : ''}</div>
        <div class="sc-bar-wrap"><div class="sc-bar" style="width:${Math.round(counts[t.id]/max*100)}%;background:${t.color}"></div></div>
      </div>
    </div>`).join('');
}

/* ── OPEN SHEET ── */
window.openSheet = function(stationId) {
  activeStation = stationId;
  const station = STATIONS.find(s => s.id === stationId);
  const d       = currentStates[stationId] || { status:'disponible', currentTeam:null, history:[] };

  document.getElementById('sheet-title').textContent = station.label;
  document.getElementById('sheet-sub').textContent   = 'Gestiona el estado y los grupos';

  // Highlight current status buttons
  document.getElementById('btn-disponible').className =
    'status-btn' + (d.status === 'disponible' ? ' active-green' : '');
  document.getElementById('btn-ocupado').className =
    'status-btn' + (d.status === 'ocupado' ? ' active-red' : '');

  renderTeamsGrid(d);
  document.getElementById('sheet-bg').classList.add('open');
};

/* ── RENDER TEAMS GRID (inside sheet) ── */
function renderTeamsGrid(d) {
  const history     = d.history || [];
  const currentTeam = d.currentTeam;

  document.getElementById('teams-grid').innerHTML = TEAMS.map(t => {
    const isSelected = currentTeam === t.id;           // currently playing
    const isVisited  = !isSelected && history.includes(t.id); // was here, now done

    let cls = 'team-btn';
    let extraStyle = '';
    let label = t.name;

    if (isSelected) {
      cls += ' selected';
      extraStyle = `background:${hex(t.color,.15)};border-color:${hex(t.color,.7)};color:${t.color}`;
      label += ' ▶';
    } else if (isVisited) {
      cls += ' visited';
    }

    return `<button class="${cls}" style="${extraStyle}" onclick="toggleTeam('${t.id}')">
      <span class="team-dot" style="background:${t.color}"></span>
      ${label}
      <span class="cancel-x">✕</span>
    </button>`;
  }).join('');
}

/* ── TOGGLE TEAM ──
   Rules:
   - If team is in history → REMOVE from history (and clear currentTeam if it was them)
   - If team is NOT in history → ADD to history AND set as currentTeam, status → ocupado
*/
window.toggleTeam = async function(teamId) {
  const stationRef = ref(db, 'juegos/' + activeStation);
  const snap    = await get(stationRef);
  const current = snap.val() || { status:'disponible', currentTeam:null, history:[] };
  let   history = current.history ? [...current.history] : [];
  let   { status, currentTeam } = current;

  const t = TEAMS.find(t => t.id === teamId);
  const s = STATIONS.find(s => s.id === activeStation);

  if (history.includes(teamId)) {
    // ── CANCEL: remove from history ──
    history     = history.filter(id => id !== teamId);
    if (currentTeam === teamId) {
      currentTeam = null;
      // If no other team is playing right now, set disponible
      status = 'disponible';
    }
    showToast(`↩ ${t.name} eliminado de ${s.label}`);
  } else {
    // ── ADD: mark as playing ──
    history.push(teamId);
    currentTeam = teamId;
    status      = 'ocupado';
    showToast(`🔴 ${s.label} → ${t.name} jugando`);
  }

  await set(stationRef, { status, currentTeam, history });

  // Re-render the sheet grid with updated data
  renderTeamsGrid({ status, currentTeam, history });

  // Update status buttons
  document.getElementById('btn-disponible').className =
    'status-btn' + (status === 'disponible' ? ' active-green' : '');
  document.getElementById('btn-ocupado').className =
    'status-btn' + (status === 'ocupado' ? ' active-red' : '');
};

/* ── SET STATUS (disponible / ocupado buttons) ── */
window.setStatus = async function(newStatus) {
  const stationRef = ref(db, 'juegos/' + activeStation);
  const snap    = await get(stationRef);
  const current = snap.val() || { status:'disponible', currentTeam:null, history:[] };

  // If setting disponible, clear currentTeam
  const currentTeam = newStatus === 'disponible' ? null : current.currentTeam;

  await set(stationRef, { ...current, status: newStatus, currentTeam });

  document.getElementById('btn-disponible').className =
    'status-btn' + (newStatus === 'disponible' ? ' active-green' : '');
  document.getElementById('btn-ocupado').className =
    'status-btn' + (newStatus === 'ocupado' ? ' active-red' : '');

  const s = STATIONS.find(s => s.id === activeStation);
  showToast(newStatus === 'disponible' ? `🟢 ${s.label} → Disponible` : `🔴 ${s.label} → Ocupado`);
};

/* ── CLOSE SHEET ── */
window.closeSheet = function() {
  document.getElementById('sheet-bg').classList.remove('open');
  activeStation = null;
};

/* ── HELPERS ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

function hex(h, a) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
</script>
</body>
</html>
