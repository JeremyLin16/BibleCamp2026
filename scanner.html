<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Misiones del Campamento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  /* ─── VARIABLES ─────────────────────────────────────── */
  :root {
    --deep:   #0d2218;
    --forest: #1a3a2a;
    --gold:   #f5c842;
    --gold2:  #e8a000;
    --mist:   #8baaa0;
    --white:  #f0ede6;
    --task0:  #4ecdc4;
    --task1:  #ff6b9d;
    --task2:  #a78bfa;
  }

  /* ─── RESET & BASE ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }
  body {
    min-height: 100%;
    background: var(--deep);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* ─── ANIMATED BACKGROUND (fixed so it covers even when scrolling) ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(26,58,42,0.8) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(13,34,24,0.9) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d5a3d' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    z-index: 0;
    pointer-events: none;
  }

  /* ─── APP CONTAINER ─────────────────────────────────── */
  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px 40px;
  }

  /* ─── SCREENS ────────────────────────────────────────── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 400px;
    width: 100%;
    gap: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── TYPOGRAPHY ─────────────────────────────────────── */
  .title {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    letter-spacing: 3px;
    line-height: 1.1;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  }
  .subtitle {
    font-size: clamp(0.9rem, 3.5vw, 1.05rem);
    font-weight: 700;
    opacity: 0.85;
    line-height: 1.5;
  }

  /* ─── CARD ───────────────────────────────────────────── */
  .card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 22px 26px;
    width: 100%;
    backdrop-filter: blur(8px);
  }

  /* ─── EMOJI ──────────────────────────────────────────── */
  .emoji-big {
    font-size: clamp(3.5rem, 16vw, 5.5rem);
    line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }

  /* ─── FAKE SCREEN ────────────────────────────────────── */
  #screen-fake .cloud {
    font-size: 5rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0);     }
    50%      { transform: translateY(-12px); }
  }

  /* ─── TASK SCREEN ────────────────────────────────────── */
  .badge {
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    letter-spacing: 3px;
    padding: 5px 14px;
    border-radius: 50px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .task-body {
    font-size: clamp(1.05rem, 4vw, 1.25rem);
    font-weight: 700;
    line-height: 1.5;
    margin-top: 6px;
  }
  .task-body a { color: var(--gold); }

  .qr-id {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    opacity: 0.25;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ─── TASK COLOUR THEMES ─────────────────────────────── */
  .task-theme-0 { --tc: var(--task0); }
  .task-theme-1 { --tc: var(--task1); }
  .task-theme-2 { --tc: var(--task2); }

  .task-theme-0 .title,
  .task-theme-1 .title,
  .task-theme-2 .title { color: var(--tc); }

  .task-theme-0 .card,
  .task-theme-1 .card,
  .task-theme-2 .card {
    border-color: var(--tc);
    box-shadow: 0 0 32px rgba(0,0,0,0.3), inset 0 0 40px rgba(255,255,255,0.02);
  }

  .task-theme-0 .badge { background: var(--task0); color: var(--deep); }
  .task-theme-1 .badge { background: var(--task1); color: var(--deep); }
  .task-theme-2 .badge { background: var(--task2); color: var(--deep); }

  /* ─── MAP WIDGET ─────────────────────────────────────── */
  /*
   * The map wrapper bleeds to the card edges and sits at the bottom.
   * card padding is 22px top/bottom, 26px left/right
   * → bleed: margin 0 -26px -22px, width calc(100% + 52px)
   */
  .map-wrapper {
    position: relative;
    width: calc(100% + 52px);
    margin: 16px -26px -22px;
    height: 220px;
    overflow: hidden;
    border-radius: 0 0 18px 18px;
    background: #0a1a10;
    touch-action: none;    /* we handle touch ourselves */
    cursor: grab;
    flex-shrink: 0;
  }
  .map-wrapper:active { cursor: grabbing; }

  .map-wrapper img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: auto;
    display: block;
    transform-origin: 0 0;   /* pinch-zoom JS uses top-left origin */
    will-change: transform;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;    /* touches go to wrapper, not image */
    transition: none;
  }

  .map-divider {
    border: none;
    border-top: 1px dashed rgba(255,255,255,0.15);
    margin: 14px 0 10px;
  }
  .map-label {
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 2px;
    opacity: 0.5;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .map-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    color: rgba(255,255,255,0.75);
    font-size: 0.68rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 0.5px;
    animation: hintFade 2s ease 1.5s forwards;
    opacity: 1;
  }
  @keyframes hintFade {
    to { opacity: 0; }
  }

  /* ─── FIREWORKS ──────────────────────────────────────── */
  #fireworks {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: explode var(--dur,1s) ease-out forwards;
  }
  @keyframes explode {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
  }

  /* ─── STAMP ANIMATION ────────────────────────────────── */
  .stamp-in {
    animation: stampIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes stampIn {
    from { transform: scale(2.5) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
  }
</style>
</head>

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Fireworks ────────────────────────────────────────────────────────
function launchFireworks() {
  const fw     = document.getElementById('fireworks');
  const colors = ['#f5c842','#ff6b9d','#4ecdc4','#a78bfa','#ff9f1c','#ffffff'];
  const cx     = window.innerWidth  / 2;
  const cy     = window.innerHeight / 3;

  for (let burst = 0; burst < 5; burst++) {
    setTimeout(() => {
      const bx = cx + (Math.random() - 0.5) * 300;
      const by = cy + (Math.random() - 0.5) * 200;
      for (let i = 0; i < 22; i++) {
        const s     = document.createElement('div');
        s.className = 'spark';
        const angle = (i / 22) * Math.PI * 2;
        const dist  = 80 + Math.random() * 120;
        s.style.cssText = `
          left:${bx}px; top:${by}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          --tx:${Math.cos(angle) * dist}px;
          --ty:${Math.sin(angle) * dist}px;
          --dur:${0.6 + Math.random() * 0.6}s;
        `;
        fw.appendChild(s);
        s.addEventListener('animationend', () => s.remove());
      }
    }, burst * 220);
  }
}

// ── Pinch-to-zoom for the map ────────────────────────────────────────
function initPinchZoom(wrapper, img) {
  const MIN_SCALE = 1;
  const MAX_SCALE = 6;

  let scale = 1, tx = 0, ty = 0;
  let mode  = null;  // 'pan' | 'pinch'

  // pan state
  let startTx = 0, startTy = 0, pointerStartX = 0, pointerStartY = 0;
  // pinch state
  let startDist = 0, startScale = 0;
  let startMidX = 0, startMidY = 0;
  let pinchStartTx = 0, pinchStartTy = 0;

  // double-tap to reset
  let lastTapTime = 0;

  function applyTransform() {
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function clamp(s, x, y) {
    const wW = wrapper.clientWidth;
    const wH = wrapper.clientHeight;
    const iW = img.naturalWidth  || img.clientWidth;
    const iH = img.naturalHeight || img.clientHeight;
    const scaledW = iW * s;
    const scaledH = iH * s;
    return {
      x: scaledW <= wW ? (wW - scaledW) / 2 : Math.min(0, Math.max(wW - scaledW, x)),
      y: scaledH <= wH ? (wH - scaledH) / 2 : Math.min(0, Math.max(wH - scaledH, y))
    };
  }

  wrapper.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      // check double-tap
      const now = Date.now();
      if (now - lastTapTime < 280) {
        scale = 1; tx = 0; ty = 0;
        applyTransform();
        lastTapTime = 0;
        return;
      }
      lastTapTime = now;

      mode          = 'pan';
      pointerStartX = e.touches[0].clientX;
      pointerStartY = e.touches[0].clientY;
      startTx       = tx;
      startTy       = ty;

    } else if (e.touches.length === 2) {
      mode = 'pinch';
      const dx    = e.touches[1].clientX - e.touches[0].clientX;
      const dy    = e.touches[1].clientY - e.touches[0].clientY;
      startDist   = Math.hypot(dx, dy);
      startScale  = scale;
      const rect  = wrapper.getBoundingClientRect();
      startMidX   = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      startMidY   = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      pinchStartTx = tx;
      pinchStartTy = ty;
    }
  }, { passive: false });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();

    if (mode === 'pan' && e.touches.length === 1) {
      const dx = e.touches[0].clientX - pointerStartX;
      const dy = e.touches[0].clientY - pointerStartY;
      const c  = clamp(scale, startTx + dx, startTy + dy);
      tx = c.x; ty = c.y;
      applyTransform();

    } else if (mode === 'pinch' && e.touches.length >= 2) {
      const dx      = e.touches[1].clientX - e.touches[0].clientX;
      const dy      = e.touches[1].clientY - e.touches[0].clientY;
      const dist    = Math.hypot(dx, dy);
      const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, startScale * (dist / startDist)));

      // Keep pinch mid-point fixed
      const newTx = startMidX - (startMidX - pinchStartTx) * (newScale / startScale);
      const newTy = startMidY - (startMidY - pinchStartTy) * (newScale / startScale);
      const c     = clamp(newScale, newTx, newTy);

      scale = newScale; tx = c.x; ty = c.y;
      applyTransform();
    }
  }, { passive: false });

  wrapper.addEventListener('touchend', e => {
    if (e.touches.length === 0)      { mode = null; }
    else if (e.touches.length === 1) {
      mode          = 'pan';
      pointerStartX = e.touches[0].clientX;
      pointerStartY = e.touches[0].clientY;
      startTx       = tx;
      startTy       = ty;
    }
  });
}

// ── Render task ──────────────────────────────────────────────────────
function renderTask(mission, qrId) {
  const screen = document.getElementById('screen-task');
  screen.className = `screen task-theme-${mission.theme}`;

  document.getElementById('task-emoji').textContent = mission.emoji || '🎯';
  document.getElementById('task-title').innerHTML   = mission.title;
  document.getElementById('task-badge').textContent = mission.label;
  document.getElementById('task-body').innerHTML    = mission.body;
  document.getElementById('task-qr-id').textContent = `código · ${qrId}`;

  // Map
  const mapSection = document.getElementById('map-section');
  const mapWrapper = document.getElementById('map-wrapper');
  const mapImg     = document.getElementById('mission-map');

  if (mission.map) {
    mapImg.src = mission.map;
    mapSection.style.display = 'block';
    // Init zoom after image loads (so we know natural dimensions)
    mapImg.onload = () => initPinchZoom(mapWrapper, mapImg);
    // Also init now in case image is already cached
    if (mapImg.complete && mapImg.naturalWidth) initPinchZoom(mapWrapper, mapImg);
  } else {
    mapSection.style.display = 'none';
  }

  showScreen('screen-task');
  launchFireworks();
}

// ── Entry point ──────────────────────────────────────────────────────
function run() {
  const qrId   = getParam('id').toLowerCase();
  const mission = MISSION_POOL[qrId];

  if (!mission) {
    showScreen('screen-fake');
    return;
  }

  renderTask(mission, qrId);
}

run();
</script>
